<!DOCTYPE html>
<html>
<body>
<h1>Gallifreyan scribe</h1>
 

<div style="display:flex; align-items:flex-start; gap:12px;">
    <div id="modeColumn" style="display:flex; flex-direction:column; gap:6px;">
        <button class="mode-button" data-mode="mode1">mode1</button>
        <button class="mode-button" data-mode="mode2">mode2</button>
        <button class="mode-button" data-mode="mode3">mode3</button>
    </div>
    <canvas id="myCanvas" width="1000" height="500" style="border:1px solid grey"></canvas>
</div>

<script src="shapes.js"></script>
<script src="buttons.js"></script>
<script>
    var drawMode = null;

    const c = document.getElementById("myCanvas");
    const ctx = c.getContext("2d");
    const crect = c.getBoundingClientRect();
    ctx.lineWidth = 8
    ctx.lineCap = "round"; // butt round square
    center = new Point(200, 250);
    ring = new Ring(center, 100);
    // dent = new Dent(ring, 0, to_rad(40), 6);
    ring.addDent( to_rad(40), to_rad(60), 6)
    // ring.addDent( to_rad(140), to_rad(230), 10)
    // ring.addDent( to_rad(270), to_rad(290), 30)
    ring.draw(ctx);
    // dent.draw(ctx);
    var mouse = new Point(0,0)
    var orbit = new PolarPoint(center, 120, 1)
    var moon = new Ring(orbit, 3);

    c.addEventListener("mousemove", function(e) {
        mouse.x = e.clientX - crect.left;
        mouse.y = e.clientY - crect.top;
    });


    let start = Date.now(); // remember start time
    let timer = setInterval(function() {
        // how much time passed from the start?
        let a = xy_to_angle(center.x - mouse.x, center.y - mouse.y)
        d = ring.dents[0]
        dr = (d.end - d.start)/2.
        d.start = a-dr
        d.end = a+dr
        // ring.dents[0].start = a
        orbit.angle = a
        console.log('a ', a )
        ctx.strokeStyle = "black"
        if(drawMode == "mode1"){
            ctx.strokeStyle = "blue"
        }
        ctx.clearRect(0, 0, c.width, c.height);
        // ring.dents.forEach(dent => {
        //     dent.start += 0.01
        //     dent.end += 0.01
        // });
        // ring.dents[0].end += 0.01;
        ring.draw(ctx)
        moon.draw(ctx)
        let timePassed = Date.now() - start;

        // if (timePassed >= 2000) {
        //     clearInterval(timer); // finish the animation after 2 seconds
        //     return;
        // }
        ctx.strokeStyle = "red"
        ctx.beginPath();
        ctx.arc(mouse.x, mouse.y, 2, 0, 2 * Math.PI);
        ctx.stroke(); 
        console.log(drawMode)

    }, 20);
    
    // Mode buttons: exclusive selection updates `drawMode`
    
    

</script>

</html>
