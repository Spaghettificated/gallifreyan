<!DOCTYPE html>
<html>
<body>
<h1>Gallifreyan scribe</h1>
 

<script src="placers.js"></script>

<div style="display:flex; align-items:flex-start; gap:12px;">
    <div id="modeColumn" style="display:flex; flex-direction:column; gap:6px;">
        <button class="mode-button" data-mode=0 data-keybind="1" style ="width: 80px"> select </button>
        <button class="mode-button" data-mode=1 data-keybind="2" style ="width: 80px"> dent </button>
        <button class="mode-button" data-mode=2 data-keybind="3" style ="width: 80px"> ring </button>
    </div>
    <canvas id="myCanvas" width="1000" height="500" style="border:1px solid grey"></canvas>
</div>

<script src="shapes.js"></script>
<script src="buttons.js"></script>
<script>

    const c = document.getElementById("myCanvas");
    const ctx = c.getContext("2d");
    const crect = c.getBoundingClientRect();
    ctx.lineWidth = 8
    ctx.lineCap = "round"; // butt round square
    center = new Point(250, 250);
    ring = new Ring(center, 200);
    // dent = new Dent(ring, 0, to_rad(40), 6);
    ring.addDent( to_rad(40), to_rad(60), 16)
    // ring.addDent( to_rad(140), to_rad(230), 10)
    // ring.addDent( to_rad(270), to_rad(290), 30)
    // dent.draw(ctx);
    var mouse = new Point(0,0)
    var orbit = new RingPoint(ring, 0, to_rad(50))
    var moon = new Dot(orbit, 7);
    var pointer = new Dot(mouse, 5)
    var figures = [ring, moon]

    c.addEventListener("mousemove", function(e) {
        mouse.x = e.clientX - crect.left;
        mouse.y = e.clientY - crect.top;
    });
    var click = false
    var phase = 0
    c.addEventListener("click", function(e) {
        click = true
    });

    drawing = null


    let start = Date.now(); // remember start time
    let timer = setInterval(function() {
        let timePassed = Date.now() - start;
        ctx.clearRect(0, 0, c.width, c.height);
        ctx.strokeStyle = "black"
        ctx.fillStyle = "black"

        if(drawMode == Modes.RING){
            drawing = drawing ?? new Ring(mouse, 30)
            if(phase == 1){
                let r = xy_to_r(drawing.center.x - mouse.x, drawing.center.y - mouse.y)
                drawing.r = r>5 ? r : drawing.r
            }
            drawing.draw(ctx)
            if(click){
                if(phase == 0){
                    drawing.center = ring.pointAsRingAttached(drawing.center)
                    phase = 1
                }
                else{
                    figures.push(drawing)
                    drawing = null
                    phase = 0
                }
            }
        }

        let a = xy_to_angle(center.x - mouse.x, center.y - mouse.y)
        if(drawMode == Modes.DENT){
            d = ring.dents[0]
            dr = (d.end - d.start)/2.
            d.start = a-dr
            d.end = a+dr
            orbit.angle = a
        }

        if(drawMode == Modes.SELECT){
            ring.r = 200 + 15 * Math.sin(timePassed/300)
            ctx.strokeStyle = "blue"
        }

        figures.forEach(f =>{
            f.draw(ctx)
        })


        // ctx.fillStyle = "red"
        // pointer.draw(ctx)
        
        click = false
    }, 20);
    

</script> 

</body>
</html>
