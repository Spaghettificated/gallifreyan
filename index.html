<!DOCTYPE html>
<html>
<body>

        <button class="mode-button" data-mode=4 data-keybind="5" style ="width: 80px"> line </button>
        <button class="mode-button" data-mode=5 data-keybind="6" style ="width: 80px"> vowel </button>
    </div>
    <canvas id="scribe" width="500" height="500"></canvas>
</div>
